<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>moon8bit demo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-content: center;
        gap: 10px;
        background: radial-gradient(circle at top, #1f4068, #0f1720 58%);
        color: #d9e2ec;
        font-family: "Courier New", Courier, monospace;
      }
      .hint {
        opacity: 0.9;
        font-size: 13px;
      }
      #moon8bit-canvas {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
    </style>
  </head>
  <body>
    <div class="hint">Controls: <b>Space/ArrowUp</b> flap, <b>R</b> reset</div>
    <script src="./web.js"></script>
  </body>
</html>
